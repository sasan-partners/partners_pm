<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>+Partners PM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#f0f0f5;color:#1a1a2e;font-family:'DM Sans','Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#d0d0e0;border-radius:10px}
input,select,textarea{font-family:inherit;outline:none;color:#1a1a2e}
select option{background:#ffffff}
input[type="date"]::-webkit-calendar-picker-indicator{filter:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
#header{border-bottom:1px solid #e2e2ec;padding:0 20px;background:#ffffff;position:sticky;top:0;z-index:100;display:flex;align-items:center;height:52px;gap:0}
#logo{font-weight:900;font-size:17px;letter-spacing:-.04em;margin-right:20px;color:#1a1a2e;flex-shrink:0}
#logo span{color:#6366f1}
#nav{display:flex;gap:2px;flex:1}
.nav-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:#9ca3af;padding:0 12px;height:52px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;font-family:inherit}
.nav-btn.active{background:#eef2ff;border-bottom-color:#6366f1;color:#4f46e5}
#user-switcher{display:flex;align-items:center;gap:6px;flex-shrink:0}
#user-switcher span{font-size:11px;color:#4b5563}
.user-btn{background:transparent;border:1px solid #e8e8f0;border-radius:20px;color:#6b7280;font-size:11px;font-weight:700;padding:4px 12px;cursor:pointer;transition:all .15s;font-family:inherit}
.user-btn.active-sasan{background:#818cf820;border-color:#818cf860;color:#818cf8}
.user-btn.active-jorge{background:#38bdf820;border-color:#38bdf860;color:#38bdf8}
.user-btn.active-juan{background:#34d39920;border-color:#34d39960;color:#34d399}
#content{flex:1;padding:28px;max-width:1140px;margin:0 auto;width:100%}
.card{background:#ffffff;border:1px solid #e2e2ec;border-radius:11px;padding:16px}
.card-sm{background:#f8f8fc;border:1px solid #e8e8f0;border-radius:9px;padding:11px 14px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.stat{background:#ffffff;border:1px solid #e2e2ec;border-radius:11px;padding:18px 20px}
.stat-value{font-size:30px;font-weight:900;letter-spacing:-.05em;line-height:1}
.stat-label{font-size:11px;color:#6b7280;margin-top:5px;text-transform:uppercase;letter-spacing:.07em}
.chip{display:inline-block;border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;border:1px solid transparent}
.pill{display:inline-block;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;white-space:nowrap}
.bar-wrap{height:3px;background:#e8e8f0;border-radius:2px}
.bar-fill{height:3px;border-radius:2px;transition:width .3s}
.alert{border-radius:9px;padding:11px 16px;font-size:13px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.alert-red{background:#fef2f2;border:1px solid #fecaca;color:#dc2626}
.alert-orange{background:#fff7ed;border:1px solid #fed7aa;color:#c2410c}
.modal-overlay{position:fixed;inset:0;background:#000b;z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#ffffff;border:1px solid #dcdcec;border-radius:14px;padding:24px;width:500px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 25px 60px #0008}
.modal-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title h3{font-size:15px;font-weight:800}
.close-btn{background:#1e1e2e;border:none;color:#6b7280;cursor:pointer;border-radius:6px;width:28px;height:28px;font-size:16px;display:flex;align-items:center;justify-content:center}
.field{margin-bottom:14px}
.field label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#6b7280;display:block;margin-bottom:6px}
.inp{width:100%;background:#f3f3f8;border:1px solid #dcdcec;border-radius:7px;color:#1a1a2e;font-size:13px;padding:8px 10px;font-family:inherit}
.inp:focus{border-color:#6366f160}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.btn{border:none;border-radius:8px;font-size:12px;font-weight:700;padding:9px 16px;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-primary{background:#6366f1;color:#fff}
.btn-secondary{background:#f0f0f5;color:#6b7280}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:6px}
.task-card{background:#f8f8fc;border:1px solid #e8e8f0;border-radius:9px;padding:11px 14px;display:flex;align-items:flex-start;gap:10px;transition:border-color .15s}
.task-card.overdue{border-color:#ef444428}
.task-card.done{opacity:.5}
.checkbox{width:17px;height:17px;border-radius:5px;border:2px solid #374151;background:transparent;flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:all .15s}
.checkbox.checked{background:#10b981;border-color:#10b981}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
#toast{position:fixed;top:16px;right:16px;z-index:500;border-radius:9px;padding:10px 18px;font-size:13px;font-weight:600;box-shadow:0 8px 24px #0006;animation:fadeIn .2s;display:none}
#agent-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;margin-bottom:14px;padding-right:4px}
.msg-user{display:flex;justify-content:flex-end}
.msg-ai{display:flex;justify-content:flex-start;align-items:flex-end;gap:8px}
.msg-bubble{max-width:75%;border-radius:14px;padding:11px 15px;font-size:13px;line-height:1.65;white-space:pre-wrap;font-family:inherit}
.msg-bubble.user{background:#6366f1;color:#fff;border-radius:14px 14px 4px 14px}
.msg-bubble.ai{background:#ffffff;border:1px solid #e2e2ec;color:#1a1a2e;border-radius:14px 14px 14px 4px}
.ai-icon{width:28px;height:28px;border-radius:50%;background:#6366f120;border:1.5px solid #6366f140;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
#loading{position:fixed;inset:0;background:#f0f0f5;z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.spinner{width:32px;height:32px;border:3px solid #1e1e2e;border-top-color:#6366f1;border-radius:50%;animation:spin 1s linear infinite}
.match-card{background:#ffffff;border:1px solid #e2e2ec;border-radius:11px;padding:16px;margin-bottom:12px}
.score-bar{height:6px;border-radius:3px;background:#e8e8f0;margin:8px 0}
.score-fill{height:6px;border-radius:3px;transition:width .5s}
.sync-progress-bar{height:6px;background:#e8e8f0;border-radius:3px;margin-top:8px;overflow:hidden}
.sync-progress-fill{height:6px;background:#6366f1;border-radius:3px;transition:width .3s}
</style>
</head>
<body>

<div id="loading">
  <div style="font-size:22px;font-weight:900;color:#fff"><span style="color:#6366f1">+</span>Partners PM</div>
  <div class="spinner"></div>
  <div style="font-size:13px;color:#6b7280">Conectando con la base de datos...</div>
</div>

<div id="toast"></div>
<div id="header">
  <div id="logo"><span>+</span>Partners PM</div>
  <nav id="nav">
    <button class="nav-btn active" onclick="setView('dashboard')">&#x2B21; Inicio</button>
    <button class="nav-btn" onclick="setView('projects')">&#x25C8; Proyectos</button>
    <button class="nav-btn" onclick="setView('tasks')">&#x25A3; Tareas</button>
    <button class="nav-btn" onclick="setView('meetings')">&#x25CE; Reuniones</button>
    <button class="nav-btn" onclick="setView('agent')">&#x2726; Agente IA</button>
    <button class="nav-btn" onclick="setView('crm')">&#x25C9; CRM</button>
    <button class="nav-btn" onclick="setView('match')">&#x27E1; Match</button>
    <button class="nav-btn" onclick="setView('leads')">&#x25B6; Leads</button>
  </nav>
  <div id="user-switcher">
    <span>Vista:</span>
    <button class="user-btn active-sasan" onclick="setUser('Sasan')">Sasan</button>
    <button class="user-btn" onclick="setUser('Jorge')">Jorge</button>
    <button class="user-btn" onclick="setUser('Juan')">Juan</button>
  </div>
</div>
<div id="content"></div>
<div id="modal-container"></div>

<script>
const SUPABASE_URL = 'https://phjiuommgudbwywuumvs.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Oq_4uJ9TVFv6LkQe6Dirdg_P7bUWImT';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const PROXY = 'https://partners-proxy.sasan-a91.workers.dev';

let state = { projects:[], tasks:[], meetings:[] };
let currentUser = 'Sasan';
let currentView = 'dashboard';
let selProject = null;
let agentHistory = [];
let agentProject = '';
let filterUser = 'all';
let filterProject = 'all';
let crmContacts = [];
let crmSearch = '';
let crmLoading = false;
let matchResult = null;
let matchLoading = false;
let matchQuery = '';
let syncProgress = null;
let syncTotal = 0;
let syncIndexed = 0;
let agentMode = 'auto';
let leadsData = [];
let leadsLoading = false;
let leadsSearch = '';

const USERS = ['Sasan','Jorge','Juan'];
const STATUSES = ['backlog','análisis','ejecución','terminado'];
const PRIORITIES = ['urgente','alta','media','baja'];
const TASK_STATUSES = ['pendiente','en progreso','bloqueada','completada'];
const MEETING_TYPES = ['socios','pm','sme','cliente','externa'];
const USER_COLORS = {Sasan:'#818cf8',Jorge:'#38bdf8',Juan:'#34d399'};
const STATUS_COLORS = {backlog:'#6b7280',análisis:'#f59e0b',ejecución:'#6366f1',terminado:'#10b981'};
const PRIORITY_COLORS = {urgente:'#ef4444',alta:'#f97316',media:'#eab308',baja:'#6b7280'};
const TASK_STATUS_COLORS = {pendiente:'#6b7280','en progreso':'#6366f1',bloqueada:'#ef4444',completada:'#10b981'};
const MEET_COLORS = {socios:'#818cf8',pm:'#38bdf8',sme:'#a78bfa',cliente:'#34d399',externa:'#f59e0b'};
const LEAD_STAGES = ['Nuevo','En conversación','Propuesta enviada','Negociación','Cerrado ganado','Cerrado perdido'];
const LEAD_STAGE_COLORS = {'Nuevo':'#6366f1','En conversación':'#38bdf8','Propuesta enviada':'#f59e0b','Negociación':'#f97316','Cerrado ganado':'#10b981','Cerrado perdido':'#ef4444'};
const LEAD_SERVICES = ['Fintech Week','CxInternacionalización','CxInnovación','Academy'];
const LEAD_SERVICE_COLORS = {'Fintech Week':'#6366f1','CxInternacionalización':'#38bdf8','CxInnovación':'#a78bfa','Academy':'#10b981'};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function today(){ return new Date().toISOString().split('T')[0]; }
function daysUntil(d){ if(!d) return null; return Math.ceil((new Date(d)-new Date(today()))/86400000); }
function fmtDate(d){ if(!d) return '—'; const [y,m,dd]=d.split('-'); return dd+'/'+m+'/'+y; }
function dueInfo(days){
  if(days===null) return null;
  if(days<0) return {text:'Vencida '+Math.abs(days)+'d',c:'#ef4444'};
  if(days===0) return {text:'Hoy',c:'#f97316'};
  if(days<=3) return {text:days+'d',c:'#f97316'};
  if(days<=7) return {text:days+'d',c:'#eab308'};
  return {text:days+'d',c:'#6b7280'};
}
function chip(label,color){ return '<span class="chip" style="background:'+color+'18;color:'+color+';border-color:'+color+'28">'+label+'</span>'; }
function pill(label,color){ color=color||'#6b7280'; return '<span class="pill" style="background:'+color+'18;color:'+color+'">'+label+'</span>'; }
function av(name,size){ size=size||26; const c=USER_COLORS[name]||'#6b7280'; return '<div class="av" title="'+name+'" style="width:'+size+'px;height:'+size+'px;background:'+c+'20;border:1.5px solid '+c+';font-size:'+(size*.38)+'px;color:'+c+'">'+(name[0]||'?')+'</div>'; }
function bar(pct,color){ return '<div class="bar-wrap"><div class="bar-fill" style="width:'+Math.min(100,pct)+'%;background:'+color+'"></div></div>'; }

function toast(msg,color){
  color=color||'#10b981';
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=color; t.style.display='block';
  setTimeout(function(){ t.style.display='none'; },3500);
}

async function loadAll(){
  const [p,t,m] = await Promise.all([
    sb.from('projects').select('*').order('created_at'),
    sb.from('tasks').select('*').order('created_at'),
    sb.from('meetings').select('*').order('date',{ascending:false}),
  ]);
  state.projects = p.data||[];
  state.tasks = t.data||[];
  state.meetings = m.data||[];
}

async function dbAddTask(t){
  const {data,error} = await sb.from('tasks').insert([t]).select().single();
  if(!error){ state.tasks.push(data); render(); toast('Tarea creada'); }
  else toast('Error al crear tarea','#ef4444');
}
async function dbUpdateTask(id,changes){
  const {error} = await sb.from('tasks').update(changes).eq('id',id);
  if(!error){ const i=state.tasks.findIndex(function(t){ return t.id===id; }); if(i>=0) Object.assign(state.tasks[i],changes); render(); }
}
async function dbAddProject(p){
  const {data,error} = await sb.from('projects').insert([p]).select().single();
  if(!error){ state.projects.push(data); render(); toast('Proyecto creado'); }
  else toast('Error al crear proyecto','#ef4444');
}
async function dbAddMeeting(m){
  const {data,error} = await sb.from('meetings').insert([m]).select().single();
  if(!error){ state.meetings.unshift(data); render(); toast('Reunión registrada'); indexMeeting(data); }
  else toast('Error al guardar reunión','#ef4444');
}
async function dbUpdateProject(id,ch){
  const {error}=await sb.from('projects').update(ch).eq('id',id);
  if(!error){const i=state.projects.findIndex(function(p){return p.id===id;});if(i>=0)Object.assign(state.projects[i],ch);render();toast('Proyecto actualizado');}
  else toast('Error','#ef4444');
}
async function dbDeleteProject(id){
  await sb.from('tasks').delete().eq('project_id',id);
  const {error}=await sb.from('projects').delete().eq('id',id);
  if(!error){state.projects=state.projects.filter(function(p){return p.id!==id;});state.tasks=state.tasks.filter(function(t){return t.project_id!==id;});selProject=null;render();toast('Proyecto eliminado');}
  else toast('Error','#ef4444');
}
async function dbUpdateMeeting(id,ch){
  const {error}=await sb.from('meetings').update(ch).eq('id',id);
  if(!error){const i=state.meetings.findIndex(function(m){return m.id===id;});if(i>=0)Object.assign(state.meetings[i],ch);render();toast('Reunión actualizada');}
  else toast('Error','#ef4444');
}
async function dbDeleteMeeting(id){
  const {error}=await sb.from('meetings').delete().eq('id',id);
  if(!error){state.meetings=state.meetings.filter(function(m){return m.id!==id;});render();toast('Reunión eliminada');}
  else toast('Error','#ef4444');
}
async function dbDeleteTask(id){
  const {error}=await sb.from('tasks').delete().eq('id',id);
  if(!error){state.tasks=state.tasks.filter(function(t){return t.id!==id;});render();toast('Tarea eliminada');}
  else toast('Error','#ef4444');
}

async function indexMeeting(m){
  try {
    const proj = state.projects.find(function(p){ return p.id===m.project_id; });
    await fetch(PROXY+'/knowledge/index-meeting',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:m.id,title:m.title,date:m.date,type:m.type,project:proj?proj.name:'',external_attendees:m.external_attendees||'',notes:m.notes||''}),
    });
  } catch(e){ console.log('index meeting error',e); }
}

function setView(v){
  currentView=v; selProject=null;
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  const idx={dashboard:0,projects:1,tasks:2,meetings:3,agent:4,crm:5,match:6,leads:7}[v];
  const btns=document.querySelectorAll('.nav-btn');
  if(btns[idx]) btns[idx].classList.add('active');
  render();
}
function setUser(u){
  currentUser=u;
  document.querySelectorAll('.user-btn').forEach(function(b){ b.className='user-btn'; });
  const btn=document.querySelectorAll('.user-btn')[USERS.indexOf(u)];
  if(btn) btn.className='user-btn active-'+u.toLowerCase();
  render();
}

function render(){
  const el=document.getElementById('content');
  if(currentView==='dashboard') el.innerHTML=renderDashboard();
  else if(currentView==='projects') el.innerHTML=renderProjects();
  else if(currentView==='tasks') el.innerHTML=renderTasks();
  else if(currentView==='meetings') el.innerHTML=renderMeetings();
  else if(currentView==='agent') el.innerHTML=renderAgent();
  else if(currentView==='crm'){ el.innerHTML=renderCRM(); if(crmContacts.length===0) loadCRM(); }
  else if(currentView==='match') el.innerHTML=renderMatch();
  else if(currentView==='leads'){ el.innerHTML=renderLeads(); }
  bindEvents();
}

function taskCardHTML(t,compact){
  compact=compact||false;
  const proj=state.projects.find(function(p){ return p.id===t.project_id; });
  const days=daysUntil(t.due_date);
  const due=dueInfo(days);
  const done=t.status==='completada';
  const overdue=days!==null&&days<0&&!done;
  return '<div class="task-card'+(overdue?' overdue':'')+(done?' done':'')+'" data-id="'+t.id+'">'+
    '<button class="checkbox'+(done?' checked':'')+'" onclick="toggleTask(\''+t.id+'\',\''+t.status+'\')" style="'+(done?'':'border-color:#374151')+'">'+
    (done?'<span style="font-size:9px;color:#fff;line-height:1">&#x2713;</span>':'')+
    '</button>'+
    '<div style="flex:1;min-width:0">'+
    '<div style="font-size:13px;font-weight:500;color:'+(done?'#6b7280':'#e8e8f0')+';text-decoration:'+(done?'line-through':'none')+';line-height:1.4">'+t.title+'</div>'+
    (!compact&&t.notes?'<div style="font-size:11px;color:#6b7280;margin-top:3px;line-height:1.4">'+t.notes+'</div>':'')+
    '<div style="display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;align-items:center">'+
    (proj?chip(proj.name,'#6366f1'):'')+
    chip(t.priority,PRIORITY_COLORS[t.priority])+
    (due?'<span style="font-size:10px;color:'+due.c+';font-weight:600">'+due.text+'</span>':'')+
    '</div></div>'+
    '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">'+
    av(t.assignee,22)+
    (!compact?'<div style="display:flex;gap:4px"><button onclick="openEditTaskModal(\''+t.id+'\')" style="background:#eeeef5;border:1px solid #dcdcec;border-radius:4px;color:#6b7280;font-size:10px;padding:2px 6px;cursor:pointer">&#x270F;</button><button onclick="if(confirm(\'Eliminar?\'))dbDeleteTask(\''+t.id+'\')" style="background:#ef444415;border:1px solid #ef444430;border-radius:4px;color:#ef4444;font-size:10px;padding:2px 6px;cursor:pointer">&#x2715;</button></div>':'')+
    (!compact?'<select onchange="changeTaskStatus(\''+t.id+'\',this.value)" style="background:#eeeef5;border:1px solid #dcdcec;border-radius:5px;color:'+TASK_STATUS_COLORS[t.status]+';font-size:10px;padding:2px 5px;cursor:pointer;font-family:inherit">'+TASK_STATUSES.map(function(s){ return '<option value="'+s+'"'+(t.status===s?' selected':'')+'>'+s+'</option>'; }).join('')+'</select>':'')+
    '</div></div>';
}

function renderDashboard(){
  const myTasks=state.tasks.filter(function(t){ return t.assignee===currentUser&&t.status!=='completada'; });
  const overdue=myTasks.filter(function(t){ return t.due_date&&daysUntil(t.due_date)<0; });
  const soon=myTasks.filter(function(t){ return t.due_date&&daysUntil(t.due_date)>=0&&daysUntil(t.due_date)<=5; });
  const active=state.projects.filter(function(p){ return p.status==='ejecución'; });
  return '<div>'+
    '<div style="margin-bottom:24px"><h1 style="font-size:24px;font-weight:900;margin:0 0 4px;letter-spacing:-.04em">Hola, '+currentUser+' &#x1F44B;</h1>'+
    '<p style="color:#6b7280;font-size:13px;margin:0">'+new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+'</p></div>'+
    (overdue.length?'<div class="alert alert-red">&#x26A0; Tenés <b>'+overdue.length+'</b> tarea'+(overdue.length>1?'s':'')+' vencida'+(overdue.length>1?'s':'')+': <span style="opacity:.8">'+overdue.map(function(t){ return t.title; }).join(' · ')+'</span></div>':'')+
    (soon.length?'<div class="alert alert-orange">&#x23F1; <b>'+soon.length+'</b> tarea'+(soon.length>1?'s':'')+' vence'+(soon.length>1?'n':'')+' en los próximos 5 días</div>':'')+
    '<div class="stats-grid">'+
    '<div class="stat"><div class="stat-value" style="color:#818cf8">'+myTasks.length+'</div><div class="stat-label">Mis pendientes</div></div>'+
    '<div class="stat"><div class="stat-value" style="color:#38bdf8">'+active.length+'</div><div class="stat-label">Proyectos activos</div></div>'+
    '<div class="stat"><div class="stat-value" style="color:#f87171">'+overdue.length+'</div><div class="stat-label">Vencidas</div></div>'+

function renderTasks(){
  return '<div>'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">'+

    '<option value="all">Todos los socios</option>'+USERS.map(function(u){ return '<option value="'+u+'"'+(filterUser===u?' selected':'')+'>'+u+'</option>'; }).join('')+
    '</select>'+
    '<select id="filter-proj" onchange="filterProject=this.value;render()" class="inp" style="width:auto;padding:6px 10px">'+
    '<option value="all">Todos los proyectos</option>'+
    '<option value="unassigned"'+(filterProject==='unassigned'?' selected':'')+'>Sin proyecto asignado</option>'+
    state.projects.map(function(p){ return '<option value="'+p.id+'"'+(filterProject===p.id?' selected':'')+'>'+p.name+'</option>'; }).join('')+
    '</select>'+
    '<button class="btn btn-secondary btn-sm" onclick="autoAssignProjects()" style="font-size:11px">🔧 Auto-asignar proyectos</button>'+
    '<button class="btn btn-primary" onclick="openTaskModal()">+ Nueva tarea</button></div></div>'+
    TASK_STATUSES.filter(function(s){ return s!=='completada'; }).map(function(status){
      const tasks=state.tasks.filter(function(t){
        const userMatch=filterUser==='all'||t.assignee===filterUser;
        const projMatch=filterProject==='all'||(filterProject==='unassigned'?!t.project_id:t.project_id===filterProject);
        return t.status===status&&userMatch&&projMatch;
      });
      if(!tasks.length) return '';
      tasks.sort(function(a,b){ return PRIORITIES.indexOf(a.priority)-PRIORITIES.indexOf(b.priority); });
      return '<div style="margin-bottom:24px">'+
        '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:'+TASK_STATUS_COLORS[status]+';margin-bottom:10px">'+status+' · '+tasks.length+'</div>'+
        '<div style="display:flex;flex-direction:column;gap:7px">'+tasks.map(function(t){ return taskCardHTML(t); }).join('')+'</div></div>';
    }).join('')+
    (function(){
      const done=state.tasks.filter(function(t){
        const userMatch=filterUser==='all'||t.assignee===filterUser;
        const projMatch=filterProject==='all'||(filterProject==='unassigned'?!t.project_id:t.project_id===filterProject);
        return t.status==='completada'&&userMatch&&projMatch;
      });
      if(!done.length) return '';
      return '<details style="margin-top:16px"><summary style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#10b981;cursor:pointer;margin-bottom:10px">Completadas · '+done.length+'</summary>'+
        '<div style="display:flex;flex-direction:column;gap:6px;margin-top:10px">'+done.map(function(t){ return taskCardHTML(t); }).join('')+'</div></details>';
    })()+'</div>';
}

const AGENT_MODES=[

  {id:'leads',label:'▶ Leads',color:'#10b981',desc:'Oportunidades comerciales y follow-ups'},
  {id:'meetings',label:'◎ Reuniones',color:'#f59e0b',desc:'Notas, decisiones y tareas de reuniones'},
  {id:'match',label:'⟡ Match',color:'#a78bfa',desc:'Contactos y conexiones para clientes'},
];
const QUICK_PROMPTS_BY_MODE={
  auto:['¿Qué tengo que mover esta semana?','¿Qué está en riesgo?','Dame un resumen de todo'],
  pm:['¿Qué proyectos están en riesgo?','¿Qué tareas vencidas hay?','¿Qué tiene pendiente Jorge?','Resumime el estado de todos los proyectos'],

};
function setAgentMode(mode){ agentMode=mode; agentHistory=[]; render(); }

  return '<div style="display:flex;flex-direction:column;height:calc(100vh - 120px)">'+
    '<div style="margin-bottom:14px;display:flex;justify-content:space-between;align-items:flex-start">'+
    '<div><h2 style="font-size:20px;font-weight:900;margin:0 0 4px;letter-spacing:-.03em">&#x2726; Agente IA</h2>'+
    '<p style="font-size:12px;color:#6b7280;margin:0">'+mode.desc+'</p></div>'+
    '<div style="display:flex;gap:8px;align-items:center">'+
    (agentMode==="pm"?'<select id="agent-proj-sel" onchange="agentProject=this.value" class="inp" style="width:auto;padding:5px 8px;font-size:11px"><option value="">Sin asignar</option>'+state.projects.map(function(p){ return '<option value="'+p.id+'">'+p.name+'</option>'; }).join('')+'</select>':'')+
    (agentHistory.length?'<button onclick="agentHistory=[];render()" class="btn btn-secondary btn-sm">Limpiar</button>':'')+
    '</div></div>'+
    '<div style="display:flex;gap:4px;margin-bottom:16px;background:#f8f8fc;border:1px solid #e2e2ec;border-radius:10px;padding:4px">'+
    AGENT_MODES.map(function(m){
      const active=agentMode===m.id;
      return '<button onclick="setAgentMode(\'+m.id+\')" style="flex:1;background:'+(active?m.color:'transparent')+';border:none;border-radius:7px;color:'+(active?'#fff':'#9ca3af')+';font-size:11px;font-weight:'+(active?700:600)+';padding:7px 2px;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap">'+m.label+'</button>';
    }).join('')+
    '</div>'+
    (!agentHistory.length?'<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">'+
    quickPrompts.map(function(s){ return '<button onclick="submitAgentSafe(this)" data-prompt="'+encodeURIComponent(s)+'" style="background:#ffffff;border:1px solid #e2e2ec;border-radius:20px;color:#6b7280;font-size:11px;padding:5px 13px;cursor:pointer;font-family:inherit">'+s+'</button>'; }).join('')+
    '</div>':'')+

      if(msg.role==='user') return '<div class="msg-user"><div class="msg-bubble user">'+msg.content+'</div></div>';
      return '<div class="msg-ai"><div class="ai-icon" style="background:'+mode.color+'20;border-color:'+mode.color+'40">&#x2726;</div><div class="msg-bubble ai">'+msg.content+'</div></div>';
    }).join('')+
    '<div id="agent-bottom"></div></div>'+
    '<div style="display:flex;gap:8px;align-items:flex-end">'+
    '<textarea id="agent-input" placeholder="Preguntame algo en modo '+mode.label+' ... (Enter = enviar · Shift+Enter = nueva línea)" class="inp" style="flex:1;height:80px;resize:none;line-height:1.5"></textarea>'+
    '<button id="agent-send-btn" onclick="submitAgentFromInput()" class="btn btn-primary" style="height:80px;padding:0 22px;border-radius:9px;font-size:13px;flex-shrink:0;background:'+mode.color+'">Enviar</button>'+
    '</div></div>';

  return '<div>'+
    '<div style="margin-bottom:24px">'+
    '<h2 style="font-size:20px;font-weight:900;margin:0 0 4px;letter-spacing:-.03em">&#x27E1; Match Engine</h2>'+
    '<p style="color:#6b7280;font-size:13px;margin:0">Describí una necesidad de un cliente y encontramos quién en tu red puede resolverla.</p>'+
    '</div>'+
    '<div style="background:#ffffff;border:1px solid #e2e2ec;border-radius:11px;padding:20px;margin-bottom:24px">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
    '<div style="font-size:13px;font-weight:700;color:#a5b4fc">Base de conocimiento</div>'+
    '<button onclick="startSync()" class="btn btn-secondary btn-sm" id="sync-btn" '+(syncProgress?'disabled':'')+'>'+
    (syncProgress?'⏳ Sincronizando...':'&#x21BB; Sincronizar contactos')+
    '</button></div>'+
    (syncProgress?
      '<div style="background:#6366f118;border-radius:8px;padding:10px 12px;font-size:12px;color:#818cf8;margin-bottom:8px">'+syncProgress+'</div>'+
      (syncTotal>0?'<div class="sync-progress-bar"><div class="sync-progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div style="font-size:11px;color:#6b7280;margin-top:4px">'+syncIndexed+' / '+syncTotal+' contactos ('+pct+'%)</div>':'')
      :
      '<div style="font-size:12px;color:#6b7280">Sincronizá tus contactos de Notion para hacer búsquedas semánticas. Solo necesitás hacerlo una vez (y cuando agregues contactos nuevos).</div>')+
    '</div>'+
    '<div style="margin-bottom:20px">'+
    '<label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#6b7280;display:block;margin-bottom:8px">Necesidad del cliente</label>'+
    '<textarea id="match-input" class="inp" style="height:100px;resize:none;line-height:1.6" placeholder="Ej: Cliente banco mediano en Argentina necesita una solución de onboarding digital con validación de identidad...">'+matchQuery+'</textarea>'+
    '<div style="display:flex;gap:8px;margin-top:10px">'+
    '<button onclick="runMatch()" class="btn btn-primary" style="flex:1" id="match-btn" '+(matchLoading?'disabled':'')+'>'+
    (matchLoading?'⏳ Buscando matches...':'&#x27E1; Buscar match')+
    '</button>'+
    '<button onclick="pasteFromMeeting()" class="btn btn-secondary">Pegar desde reunión</button>'+
    '</div></div>'+
    (matchResult&&!matchLoading?renderMatchResults():'')+

function renderMatchResults(){
  if(matchResult.error) return '<div style="background:#ef444418;border:1px solid #ef444430;border-radius:9px;padding:14px;color:#fca5a5;font-size:13px">Error: '+matchResult.error+'</div>';

// ─── SYNC BATCH — trae contactos de a 100 e indexa de a 10 en paralelo ────────
async function startSync(){
  syncProgress='Iniciando sincronización...';
  syncTotal=0;
  syncIndexed=0;
  render();

  let cursor=null;
  let page=1;
  let allContacts=[];

  try {
    // FASE 1 — contar / traer todos los contactos página a página
    while(true){
      const url=PROXY+'/notion/contacts-page'+(cursor?'?cursor='+encodeURIComponent(cursor):'');
      syncProgress='Cargando página '+page+' desde Notion...';
      render();

      const res=await fetch(url);
      const data=await res.json();
      const contacts=data.results||[];
      allContacts=allContacts.concat(contacts);

      if(!data.has_more) break;
      cursor=data.next_cursor;
      page++;
    }

    syncTotal=allContacts.length;
    syncIndexed=0;
    syncProgress='Indexando '+syncTotal+' contactos...';
    render();

    // FASE 2 — indexar en batches de 10 en paralelo
    const BATCH=10;
    for(let i=0;i<allContacts.length;i+=BATCH){
      const batch=allContacts.slice(i,i+BATCH);
      syncProgress='Indexando '+(i+1)+'-'+Math.min(i+BATCH,allContacts.length)+' de '+syncTotal+'...';
      render();

      await Promise.all(batch.map(async function(c){
        try {
          const r=await fetch(PROXY+'/notion/sync-batch',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({contact:c}),
          });
          const d=await r.json();
          if(d.success||d.skipped) syncIndexed++;
        } catch(e2){ syncIndexed++; } // contar igual para que el progreso avance
      }));
    }

    syncProgress=null;
    syncTotal=0;
    syncIndexed=0;
    toast('✓ Sync completo: '+allContacts.length+' contactos indexados','#10b981');
    render();

  } catch(e){
    syncProgress=null;
    syncTotal=0;
    syncIndexed=0;
    toast('Error en sync: '+e.message,'#ef4444');
    render();
  }
}

function notionProp(page,key,type){
  const p=page.properties[key];
  if(!p) return '';
  if(type==='title') return (p.title||[]).map(function(t){ return t.plain_text; }).join('');
  if(type==='rich_text') return (p.rich_text||[]).map(function(t){ return t.plain_text; }).join('');
  if(type==='email') return p.email||'';
  if(type==='phone') return p.phone_number||'';
  if(type==='select') return p.select?p.select.name:'';
  if(type==='multi_select') return (p.multi_select||[]).map(function(s){ return s.name; }).join(', ');
  if(type==='checkbox') return p.checkbox?'✓':'';
  return '';
}

function buildContext(mode) {
  const today = new Date().toISOString().split('T')[0];

  if (mode === 'pm') {
    const projSel = document.getElementById('agent-proj-sel');
    if (projSel) agentProject = projSel.value;
    const activeProjects = state.projects.filter(function(p){ return p.status !== 'terminado'; });
    const openTasks = state.tasks.filter(function(t){ return t.status !== 'completada'; });
    const overdue = openTasks.filter(function(t){ return t.due_date && t.due_date < today; });
    const ctx = {
      proyectos_activos: activeProjects.map(function(p){
        const tasks = openTasks.filter(function(t){ return t.project_id === p.id; });
        const overdueT = tasks.filter(function(t){ return t.due_date && t.due_date < today; });
        return { nombre: p.name, estado: p.status, responsable: p.responsible, pm: p.pm||null, sme: p.sme||null, pais: p.country, tareas_pendientes: tasks.length, tareas_vencidas: overdueT.length };
      }),
      tareas_vencidas: overdue.map(function(t){
        const p = state.projects.find(function(p){ return p.id===t.project_id; });
        return { titulo: t.title, responsable: t.assignee, prioridad: t.priority, vencimiento: t.due_date, proyecto: p?p.name:'Sin proyecto' };
      }),
      tareas_urgentes: openTasks.filter(function(t){ return t.priority==='urgente'; }).map(function(t){
        return { titulo: t.title, responsable: t.assignee, proyecto: (state.projects.find(function(p){ return p.id===t.project_id; })||{}).name||'Sin proyecto' };
      }),
    };
    return JSON.stringify(ctx, null, 2);
  }

  if (mode === 'leads') {
    const ctx = {
      leads: leadsData.map(function(c){
        const name = notionProp(c,'Name','title')||notionProp(c,'Full Name','rich_text')||'';
        const company = notionProp(c,'Company','rich_text');
        const stage = c.properties['Lead Stage']?.select?.name||'Nuevo';
        const country = notionProp(c,'Country','rich_text');
        const source = notionProp(c,'Lead Source','multi_select');
        const notes = notionProp(c,'Notes','rich_text');
        const email = notionProp(c,'Email','email');
        // Reuniones vinculadas
        const relMeetings = state.meetings.filter(function(m){
          const hay = (m.external_attendees||'').toLowerCase()+' '+(m.title||'').toLowerCase();
          const n = (name.split(' ')[0]||'').toLowerCase();
          const co = (company||'').toLowerCase();
          return (n.length>2&&hay.includes(n))||(co.length>3&&hay.includes(co));
        }).map(function(m){ return { fecha: m.date, titulo: m.title, notas: (m.notes||'').slice(0,200) }; });
        return { nombre: name, empresa: company, etapa: stage, pais: country, fuente: source, email: email, notas: notes.slice(0,300), reuniones: relMeetings };
      }),
      resumen_pipeline: LEAD_STAGES.map(function(s){
        return { etapa: s, cantidad: leadsData.filter(function(c){ return (c.properties['Lead Stage']?.select?.name||'Nuevo')===s; }).length };
      }),
    };
    return JSON.stringify(ctx, null, 2);
  }

  if (mode === 'meetings') {
    const recent = state.meetings.slice(0, 20);
    const ctx = {
      reuniones_recientes: recent.map(function(m){
        const proj = state.projects.find(function(p){ return p.id===m.project_id; });
        const tareas = state.tasks.filter(function(t){ return t.notes&&t.notes.includes(m.id)||false; });
        return { titulo: m.title, fecha: m.date, tipo: m.type, proyecto: proj?proj.name:null, externos: m.external_attendees||'', notas: (m.notes||'').slice(0,500), tareas_generadas: m.tasks_generated||[] };
      }),
    };
    return JSON.stringify(ctx, null, 2);
  }

  if (mode === 'match') {
    return JSON.stringify({ mensaje: 'Usá el Match Engine en la pestaña ⟡ Match para búsquedas semánticas sobre contactos.' });
  }

  // AUTO — contexto resumido de todo
  const openTasks = state.tasks.filter(function(t){ return t.status!=='completada'; });
  const overdue = openTasks.filter(function(t){ return t.due_date&&t.due_date<today; });
  const ctx = {
    proyectos: state.projects.map(function(p){ return { nombre: p.name, estado: p.status, responsable: p.responsible }; }),
    tareas_pendientes_total: openTasks.length,
    tareas_vencidas: overdue.length,
    mis_tareas: openTasks.filter(function(t){ return t.assignee===currentUser; }).slice(0,10).map(function(t){ return { titulo: t.title, prioridad: t.priority, vencimiento: t.due_date }; }),
    leads_activos: leadsData.length,
    leads_por_etapa: LEAD_STAGES.map(function(s){ return { etapa: s, cantidad: leadsData.filter(function(c){ return (c.properties['Lead Stage']?.select?.name||'Nuevo')===s; }).length }; }),
    reuniones_recientes: state.meetings.slice(0,5).map(function(m){ return { titulo: m.title, fecha: m.date, tipo: m.type }; }),
  };
  return JSON.stringify(ctx, null, 2);
}

async function submitAgent(msg){
  if(!msg.trim()) return;
  agentHistory.push({role:'user',content:msg});
  render();
  document.getElementById('agent-bottom')?.scrollIntoView({behavior:'smooth'});
  const projSel=document.getElementById('agent-proj-sel');
  if(projSel) agentProject=projSel.value;
  const sendBtn=document.getElementById('agent-send-btn');
  if(sendBtn){ sendBtn.disabled=true; sendBtn.textContent='...'; }

  const systemPrompt = buildSystemPrompt(agentMode);
  const context = buildContext(agentMode);
  const userMsg = 'Contexto actual:\n' + context + '\n\nPregunta/Input: ' + msg;

  try {
    const res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:2000,
      system:systemPrompt,
      messages:agentHistory.slice(0,-1).concat([{role:'user',content:userMsg}]),
    })});
    const json=await res.json();
    if(json.error){ throw new Error(json.error.message||'API error'); }
    const text=(json.content&&json.content[0]?json.content[0].text:'').replace(/```json|```/g,'').trim();
    let result;
    try{ result=JSON.parse(text); } catch(e){ result={modo:'chat',respuesta:text||'No pude procesar eso.'}; }

    if(result.modo==='tareas'&&result.tareas&&result.tareas.length){
      const projId=agentProject||'';
      for(let i=0;i<result.tareas.length;i++){
        const t=result.tareas[i];
        await dbAddTask({id:uid(),title:t.titulo,project_id:projId||null,assignee:USERS.includes(t.responsable)?t.responsable:currentUser,priority:PRIORITIES.includes(t.prioridad)?t.prioridad:'media',due_date:t.fechaVencimiento||null,notes:t.notas||'',status:'pendiente',created_at:new Date().toISOString()});
      }
      let summary='Creé '+result.tareas.length+' tarea'+(result.tareas.length>1?'s':'')+':\n'+result.tareas.map(function(t,i){ return (i+1)+'. '+t.titulo+' → '+t.responsable; }).join('\n');
      if(result.resumen) summary+='\n\n'+result.resumen;
      if(result.decisiones&&result.decisiones.length) summary+='\n\nDecisiones:\n'+result.decisiones.map(function(d){ return '• '+d; }).join('\n');
      agentHistory.push({role:'assistant',content:summary});
      toast(result.tareas.length+' tarea'+(result.tareas.length>1?'s':'')+' creada'+(result.tareas.length>1?'s':''));

    } else if(result.modo==='leads'){
      let summary=result.analisis||'';
      if(result.alertas&&result.alertas.length) summary+='\n\n⚠️ Alertas:\n'+result.alertas.map(function(a){ return '• '+a; }).join('\n');
      if(result.oportunidades&&result.oportunidades.length){
        summary+='\n\n';
        result.oportunidades.forEach(function(o){
          const riskEmoji=o.riesgo==='alto'?'🔴':o.riesgo==='medio'?'🟡':'🟢';
          summary+=riskEmoji+' '+o.nombre+(o.empresa?' ('+o.empresa+')':'')+' — '+o.etapa+'\n';
          summary+='   Próximo paso: '+o.proximo_paso+'\n';
          if(o.mensaje_sugerido) summary+='   Mensaje sugerido: '+o.mensaje_sugerido+'\n';
          summary+='\n';
        });
      }
      agentHistory.push({role:'assistant',content:summary.trim()});

    } else {
      agentHistory.push({role:'assistant',content:result.respuesta||result.resumen||'Listo.'});
    }
  } catch(e){ agentHistory.push({role:'assistant',content:'Error: '+e.message}); }
  render();
  setTimeout(function(){ document.getElementById('agent-bottom')?.scrollIntoView({behavior:'smooth'}); },100);
}

let voiceRecording=false;
let voiceRecognition=null;

function initVoiceRecognition(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    toast('Tu navegador no soporta reconocimiento de voz','#ef4444');
    return null;
  }
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  const recognition=new SpeechRecognition();
  recognition.lang='es-ES';
  recognition.continuous=false;
  recognition.interimResults=false;
  return recognition;
}

function startVoiceInput(){
  if(voiceRecording){ stopVoiceInput(); return; }
  voiceRecognition=initVoiceRecognition();
  if(!voiceRecognition) return;
  voiceRecording=true;
  const btn=document.getElementById('voice-btn');
  if(btn){ btn.style.background='#ef4444'; btn.textContent='⏹ Detener'; }
  voiceRecognition.onresult=function(event){
    const transcript=event.results[0][0].transcript;
    const titleInput=document.getElementById('t-title');
    if(titleInput){ titleInput.value=transcript; titleInput.focus(); }
    stopVoiceInput();
  };
  voiceRecognition.onerror=function(){ toast('Error en reconocimiento de voz','#ef4444'); stopVoiceInput(); };
  voiceRecognition.onend=function(){ stopVoiceInput(); };
  voiceRecognition.start();
  toast('Escuchando... habla ahora','#6366f1');
}

function stopVoiceInput(){
  if(voiceRecognition) voiceRecognition.stop();
  voiceRecording=false;
  const btn=document.getElementById('voice-btn');
  if(btn){ btn.style.background='#6366f1'; btn.textContent='🎤 Voz'; }
}

async function autoAssignProjects(){
  if(!confirm('Esto va a auto-asignar proyectos a tareas que no tengan proyecto. ¿Continuar?')) return;
  const unassigned=state.tasks.filter(function(t){ return !t.project_id; });
  if(!unassigned.length){ toast('No hay tareas sin proyecto asignado','#6366f1'); return; }
  let assigned=0;
  let skipped=0;
  const report=[];
  for(const task of unassigned){
    const titleLower=task.title.toLowerCase();
    const notesLower=(task.notes||'').toLowerCase();
    const combined=titleLower+' '+notesLower;
    let matched=null;
    for(const proj of state.projects){
      const projLower=proj.name.toLowerCase();
      const words=projLower.split(' ');
      if(combined.includes(projLower)){ matched=proj; break; }
      if(words.length>=2){
        let wordMatches=0;
        for(const word of words){ if(word.length>3&&combined.includes(word)) wordMatches++; }
        if(wordMatches>=2){ matched=proj; break; }
      }
      const keywords={'credicorp':['credicorp','hub brasil','credit corp'],'bantotal':['bantotal'],'tumipay':['tumipay'],'fintech week':['fintech week','chile fintech'],'runaid':['runaid'],'flippin':['flippin']};
      for(const key in keywords){
        if(projLower.includes(key)){
          for(const kw of keywords[key]){ if(combined.includes(kw)){ matched=proj; break; } }
        }
        if(matched) break;
      }
      if(matched) break;
    }
    if(matched){ await dbUpdateTask(task.id,{project_id:matched.id}); assigned++; report.push({task:task.title.slice(0,50),project:matched.name}); }
    else skipped++;
  }
  const mc=document.getElementById('modal-container');
  mc.innerHTML='<div class="modal-overlay" onclick="if(event.target===this)closeModal()">'+
    '<div class="modal" style="width:600px">'+
    '<div class="modal-title"><h3>Reporte de auto-asignación</h3><button class="close-btn" onclick="closeModal()">×</button></div>'+
    '<div style="margin-bottom:16px"><div style="font-size:13px;margin-bottom:8px"><b>'+assigned+'</b> tareas asignadas · <b>'+skipped+'</b> sin match</div></div>'+
    (report.length?'<div style="max-height:400px;overflow-y:auto">'+report.map(function(r){ return '<div style="background:#f8f8fc;border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:12px"><div style="color:#1a1a2e;margin-bottom:2px">'+r.task+'</div><div style="color:#6366f1;font-size:11px">→ '+r.project+'</div></div>'; }).join('')+'</div>':'')+
    '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">'+
    '<button class="btn btn-primary" onclick="closeModal();render()">Cerrar</button>'+
    '</div></div></div>';
  toast('Auto-asignación completa: '+assigned+' tareas','#10b981');
}

async function loadLeads(){
  leadsLoading=true; render();
  try {
    const res=await fetch(PROXY+'/notion/leads');
    const data=await res.json();
    if(data.error){ toast('Error: '+data.error,'#ef4444'); leadsData=[]; }
    else {
      // Filtro extra de seguridad por si el server no filtro bien
      leadsData=(data.results||[]).filter(function(c){
        const ls=c.properties['Lead Stage'];
        return ls&&ls.select&&ls.select.name;
      });
    }
  } catch(e){ toast('Error cargando leads: '+e.message,'#ef4444'); leadsData=[]; }
  leadsLoading=false; render();
}

async function updateLeadStage(notionId, stage){
  try {
    await fetch(PROXY+'/notion/update',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        pageId: notionId,
        properties:{'Lead Stage':{select:{name:stage}}}
      }),
    });
    // Actualizar local
    const c=leadsData.find(function(x){return x.id===notionId;});
    if(c&&c.properties['Lead Stage']) c.properties['Lead Stage'].select.name=stage;
    toast('Lead actualizado');
    render();
  } catch(e){ toast('Error actualizando lead','#ef4444'); }
}

async function updateLeadService(notionId, services){
  try {
    await fetch(PROXY+'/notion/update',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        pageId: notionId,
        properties:{'Servicio de interés':{multi_select: services.map(function(s){ return {name:s}; })}}
      }),
    });
    // Actualizar local
    const c=leadsData.find(function(x){return x.id===notionId;});
    if(c) c.properties['Servicio de interés']={multi_select: services.map(function(s){ return {name:s}; })};
    toast('Servicio actualizado');
    render();
  } catch(e){ toast('Error actualizando servicio','#ef4444'); }
}

function toggleLeadService(notionId, service){
  const c=leadsData.find(function(x){ return x.id===notionId; });
  if(!c) return;
  const current=(c.properties['Servicio de interés']?.multi_select||[]).map(function(s){ return s.name; });
  let updated;
  if(current.includes(service)){
    updated=current.filter(function(s){ return s!==service; });
  } else {
    updated=current.concat([service]);
  }
  updateLeadService(notionId, updated);
}

async function saveNewLead(){
  const name=document.getElementById('nl-name')?.value.trim();
  if(!name) return;
  const properties={
    'Name':{title:[{text:{content:name}}]},
    'Company':{rich_text:[{text:{content:document.getElementById('nl-company')?.value||''}}]},
    'Position':{rich_text:[{text:{content:document.getElementById('nl-position')?.value||''}}]},
    'Country':{rich_text:[{text:{content:document.getElementById('nl-country')?.value||''}}]},
    'Email':{email:document.getElementById('nl-email')?.value||null},
    'Phone':{phone_number:document.getElementById('nl-phone')?.value||null},
    'Lead Stage':{select:{name:document.getElementById('nl-stage')?.value||'Nuevo'}},
    'Lead Source':{multi_select:[{name:document.getElementById('nl-source')?.value||''}].filter(function(x){return x.name;})},
    'Servicio de interés':{multi_select:_newLeadServices.map(function(s){ return {name:s}; })},
    'Notes':{rich_text:[{text:{content:document.getElementById('nl-notes')?.value||''}}]},
  };
  _newLeadServices=[];
  closeModal();
  try {
    const res=await fetch(PROXY+'/notion/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({properties:properties})});
    const data=await res.json();
    if(data.id){ toast('Lead creado en Notion'); await loadLeads(); }
    else toast('Error al crear lead','#ef4444');
  } catch(e){ toast('Error: '+e.message,'#ef4444'); }
}

async function init(){
  // Cargar datos base primero para mostrar la app lo antes posible
  await loadAll();
  document.getElementById('loading').style.display='none';
  render();
  // Cargar leads en segundo plano sin bloquear la UI
  loadLeads();
}
init();
</script>
